name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo test
        run: cargo test --workspace
      - name: cargo test rusty_ai_agent (real-exec)
        run: cargo test -p rusty_ai_agent --features real-exec
      - name: cargo test rusty_ai_agent (http)
        run: cargo test -p rusty_ai_agent --features http
      - name: clippy
        run: cargo clippy --workspace --all-targets
